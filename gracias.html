    .btn { display: inline-block; background: linear-gradient(135deg, #1a8a3d, #177535); color: white; padding: 14px 32px; border-radius: 12px; text-decoration: none; font-weight: 700; font-size: 0.95rem; margin: 6px; box-shadow: 0 4px 15px rgba(26,138,61,0.25); transition: opacity 0.2s; }

    .btn-wa { background: linear-gradient(135deg, #25D366, #128C7E); box-shadow: 0 4px 15px rgba(37,211,102,0.25); }
    .divider { border: none; border-top: 1px solid #f0f0f0; margin: 1.5rem 0; }
    .note { font-size: 0.8rem; color: #aaa; }
  </style>
</head>
